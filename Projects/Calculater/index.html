          <div class="d-flex justify-content-evenly mb-2 gap-3">

              3
            </button>
            <button

            >
              +
            </button>
          </div> 
         
          <div class="d-flex justify-content-evenly gap-3">
            <button
              class="numPadButtons border shadow"
              onclick="Calculate('0')"
            >
              0
            </button>
            <button

            </button>
            <button

            >
