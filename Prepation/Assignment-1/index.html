<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devendra Bankhede</title>
    <link rel="stylesheet" href="style.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
</head>
<body>
    
    <div class="profile-Card">
        <div class="image">
            <image src="./images/devendra1.png" class="profile-img"></image>
        </div>

        <div class="textdata">
            <span class="data">Coding Work</span>
            <span class="job">Devendra Bankhede</span>
        </div>

        <div class="media-buttons">
            <a href="#" style="background-color: #4267b2;" class="link">
                <i class="bi bi-facebook"></i>
            </a>
            <a href="#" style="background-color: #1da1f2;" class="link">
                <i class="bi bi-twitter"></i>
            </a>
            <a href="#" style="background-color: #e1306c;" class="link">
                <i class="bi bi-instagram"></i>
            </a>
            <a href="#" style="background-color: #ff0000;" class="link">
                <i class="bi bi-youtube"></i>
            </a>
        </div>

        <div class="buttons">
            <button class="button">Subscribe</button>
            <button class="button">Message</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class="bi bi-heart"></i>
                <span class="number">60k</span>
            </div>
            <div class="data">
                <i class="bi bi-chat"></i>
                <span class="number">20k</span>
            </div>
            <div class="data">
                <i class="bi bi-share"></i>
                <span class="number">12k</span>
            </div>
        </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>
